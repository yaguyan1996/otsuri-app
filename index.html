<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>お釣り計算</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="お釣り計算">
  <meta name="theme-color" content="#6C63FF">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #F8F9FF;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px 40px;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 800;
      color: #1E1B4B;
      margin-bottom: 4px;
      text-align: center;
    }
    .subtitle {
      font-size: 0.75rem;
      color: #9CA3AF;
      margin-bottom: 20px;
      text-align: center;
    }

    /* 使い方 */
    .help-btn {
      background: none;
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      padding: 6px 14px;
      font-size: 0.78rem;
      color: #6B7280;
      cursor: pointer;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .help-panel {
      width: 100%;
      max-width: 400px;
      background: #FFFBEB;
      border: 1.5px solid #FCD34D;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      display: none;
    }
    .help-panel.open { display: block; }
    .help-panel h3 { font-size: 0.85rem; color: #92400E; margin-bottom: 10px; font-weight: 700; }
    .help-step { display: flex; gap: 10px; margin-bottom: 8px; align-items: flex-start; }
    .step-num {
      background: #F59E0B; color: #fff; border-radius: 50%;
      width: 20px; height: 20px; font-size: 0.7rem; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step-text { font-size: 0.8rem; color: #92400E; line-height: 1.5; }
    .help-legend {
      margin-top: 10px; padding-top: 10px;
      border-top: 1px solid #FCD34D;
      font-size: 0.77rem; color: #92400E; line-height: 1.7;
    }

    /* 入力カード */
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 16px rgba(108,99,255,0.08);
      margin-bottom: 14px;
    }
    .card-label { font-size: 0.75rem; color: #9CA3AF; font-weight: 600; margin-bottom: 10px; }

    .amount-display {
      background: #EEF0FF;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .yen { font-size: 1.6rem; color: #6C63FF; font-weight: 800; }
    .amount-display input {
      flex: 1; font-size: 2.4rem; font-weight: 800; color: #1E1B4B;
      background: transparent; border: none; outline: none;
      text-align: right; min-width: 0;
    }
    .amount-display input::placeholder { color: #C4B5FD; }
    .clear-btn {
      background: #C4B5FD; border: none; border-radius: 9px;
      width: 32px; height: 32px; font-size: 1rem; cursor: pointer;
      color: #6C63FF; flex-shrink: 0;
    }

    /* テンキー */
    .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .num-btn {
      background: #F8F9FF; border: none; border-radius: 13px;
      padding: 18px; font-size: 1.4rem; font-weight: 700; color: #1E1B4B;
      cursor: pointer; transition: background 0.1s, transform 0.08s; user-select: none;
    }
    .num-btn:active { background: #DDD6FE; transform: scale(0.92); }
    .num-btn.zero { grid-column: span 2; }
    .num-btn.del { background: #FEE2E2; color: #DC2626; }
    .num-btn.del:active { background: #FECACA; }

    /* ヒント */
    .hint-box {
      width: 100%; max-width: 400px;
      background: #FFFBEB; border: 1.5px solid #FCD34D;
      border-radius: 12px; padding: 10px 14px;
      font-size: 0.8rem; color: #92400E;
      margin-bottom: 10px; display: none;
      align-items: center; gap: 6px;
    }
    .hint-box.show { display: flex; }
    .hint-box strong { font-size: 1rem; font-weight: 800; }

    /* 結果 */
    .results { width: 100%; max-width: 400px; }
    .section-label {
      font-size: 0.72rem; color: #9CA3AF; font-weight: 700;
      letter-spacing: 0.08em; margin-bottom: 8px; padding-left: 2px;
    }

    .result-item {
      background: #fff;
      border-radius: 16px;
      padding: 14px 16px;
      margin-bottom: 9px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 2px solid #E5E7EB;
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .result-item:active { transform: scale(0.975); }
    .result-item.best  { border-color: #22C55E; background: #F0FDF4; }
    .result-item.exact { border-color: #3B82F6; background: #EFF6FF; }

    .pay-amount { font-size: 1.3rem; font-weight: 800; color: #1E1B4B; }
    .pay-sub    { font-size: 0.7rem; color: #9CA3AF; margin-top: 4px; line-height: 1.5; }

    .change-side { text-align: right; flex-shrink: 0; margin-left: 10px; }
    .change-amt  { font-size: 1.1rem; font-weight: 800; }
    .change-amt.zero   { color: #3B82F6; }
    .change-amt.good   { color: #22C55E; }
    .change-amt.normal { color: #7C3AED; }
    .coin-chip {
      display: inline-block; font-size: 0.65rem; font-weight: 700;
      border-radius: 20px; padding: 2px 9px; margin-top: 5px; color: #fff;
    }
    .chip-0 { background: #3B82F6; }
    .chip-1 { background: #22C55E; }
    .chip-2 { background: #7C3AED; }
    .chip-n { background: #9CA3AF; }

    .badge {
      display: inline-block; font-size: 0.62rem; font-weight: 700;
      border-radius: 6px; padding: 2px 7px; margin-left: 6px; vertical-align: middle;
    }
    .badge.green { background: #22C55E; color: #fff; }
    .badge.blue  { background: #3B82F6; color: #fff; }

    .empty {
      text-align: center; color: #C4B5FD;
      padding: 32px 0; font-size: 0.9rem; line-height: 2;
    }
  </style>
</head>
<body>

  <h1>💴 お釣り計算</h1>
  <p class="subtitle">小銭が増えない払い方を瞬時に提案</p>

  <button class="help-btn" onclick="toggleHelp()">
    <span id="help-icon">▶</span> 使い方
  </button>

  <div class="help-panel" id="help-panel">
    <h3>使い方</h3>
    <div class="help-step">
      <div class="step-num">1</div>
      <div class="step-text">レジに表示された<strong>合計金額</strong>をテンキーで入力する</div>
    </div>
    <div class="help-step">
      <div class="step-num">2</div>
      <div class="step-text"><strong>お釣りのコイン枚数が少ない順</strong>に払い方が自動で表示される（1円単位で計算）</div>
    </div>
    <div class="help-step">
      <div class="step-num">3</div>
      <div class="step-text">好きな払い方を選んでレジに出すだけ</div>
    </div>
    <div class="help-legend">
      <span style="background:#22C55E;color:#fff;border-radius:5px;padding:1px 7px;font-size:0.65rem;font-weight:700">おすすめ</span>
      お釣りのコインが最も少ない払い方<br>
      緑の数字 = お釣りのコイン枚数<br>
      小さいほど財布が軽くなる！
    </div>
  </div>

  <div class="card">
    <div class="card-label">合計金額</div>
    <div class="amount-display">
      <span class="yen">¥</span>
      <input id="amount" type="text" inputmode="none" placeholder="0" readonly>
      <button class="clear-btn" onclick="clearAll()">✕</button>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="inp('1')">1</button>
      <button class="num-btn" onclick="inp('2')">2</button>
      <button class="num-btn" onclick="inp('3')">3</button>
      <button class="num-btn" onclick="inp('4')">4</button>
      <button class="num-btn" onclick="inp('5')">5</button>
      <button class="num-btn" onclick="inp('6')">6</button>
      <button class="num-btn" onclick="inp('7')">7</button>
      <button class="num-btn" onclick="inp('8')">8</button>
      <button class="num-btn" onclick="inp('9')">9</button>
      <button class="num-btn zero" onclick="inp('0')">0</button>
      <button class="num-btn del"  onclick="del()">⌫</button>
    </div>
  </div>

  <div class="results" id="results">
    <p class="empty">金額を入力すると<br>払い方を提案します</p>
  </div>

  <script>
    let cur = '';

    function fmt(n) { return n.toLocaleString('ja-JP'); }

    const COINS = [10000,5000,2000,1000,500,100,50,10,5,1];
    const LABELS = {10000:'1万円札',5000:'5千円札',2000:'2千円札',1000:'1千円札',
                    500:'500円',100:'100円',50:'50円',10:'10円',5:'5円',1:'1円'};

    function coinCount(n) {
      let rest = n, c = 0;
      for (const d of COINS) { const q = Math.floor(rest/d); c += q; rest -= q*d; }
      return c;
    }

    function breakdown(n) {
      let rest = n; const parts = [];
      for (const d of COINS) {
        const q = Math.floor(rest/d);
        if (q > 0) { parts.push(`${LABELS[d]}×${q}`); rest -= q*d; }
      }
      return parts.join(' + ');
    }

    function toggleHelp() {
      const p = document.getElementById('help-panel');
      const open = p.classList.toggle('open');
      document.getElementById('help-icon').textContent = open ? '▼' : '▶';
    }

    function inp(d) {
      if (cur.length >= 7 || (cur===''&&d==='0')) return;
      cur += d;
      document.getElementById('amount').value = fmt(parseInt(cur));
      calc();
    }

    function del() {
      cur = cur.slice(0,-1);
      document.getElementById('amount').value = cur ? fmt(parseInt(cur)) : '';
      calc();
    }

    function clearAll() {
      cur = '';
      document.getElementById('amount').value = '';
      document.getElementById('results').innerHTML = '<p class="empty">金額を入力すると<br>払い方を提案します</p>';
    }

    function calc() {
      const total = parseInt(cur) || 0;
      if (!cur || total <= 0) { clearAll(); return; }



      // 支払い候補を生成（1円単位で全探索、ちょうど払いは除く）
      const candidates = [];
      for (let p = total + 1; p <= total + 15000; p++) {
        candidates.push({ pay: p, change: p - total });
      }
      candidates.sort((a,b) =>
        coinCount(a.change) - coinCount(b.change) ||
        coinCount(a.pay) - coinCount(b.pay) ||
        a.pay - b.pay
      );

      // 上位7件（changeCoins 1種類につき最大2件）
      const shown = [];
      const ccCount = {};
      for (const c of candidates) {
        const cc = coinCount(c.change);
        ccCount[cc] = (ccCount[cc]||0) + 1;
        if (ccCount[cc] > 2) continue;
        shown.push({ ...c, cc });
        if (shown.length >= 7) break;
      }

      let html = '<div class="section-label">支払い提案（お釣りのコインが少ない順）</div>';

      shown.forEach((s, i) => {
        const isBest  = i === 0;
        const cls     = isBest ? 'best' : '';
        const badge   = isBest ? '<span class="badge green">おすすめ</span>' : '';

        const changeColor = s.cc <= 2 ? 'good' : 'normal';
        const changeText  = `¥${fmt(s.change)}`;
        const chipClass   = s.cc === 1 ? 'chip-1' : s.cc === 2 ? 'chip-2' : 'chip-n';
        const chipLabel   = `お釣り ${s.cc}枚`;
        const changeBreak = s.change > 0 ? breakdown(s.change) : '';

        html += `
          <div class="result-item ${cls}">
            <div style="min-width:0;flex:1">
              <div class="pay-amount">¥${fmt(s.pay)} ${badge}</div>
              <div class="pay-sub">${breakdown(s.pay)}</div>
              ${changeBreak ? `<div class="pay-sub" style="color:#22C55E">← ${changeBreak}</div>` : ''}
            </div>
            <div class="change-side">
              <div class="change-amt ${changeColor}">お釣り ${changeText}</div>
              <div><span class="coin-chip ${chipClass}">${chipLabel}</span></div>
            </div>
          </div>`;
      });

      document.getElementById('results').innerHTML = html;
    }

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
  </script>
</body>
</html>
