<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>まとまりお釣り計算</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="お釣り計算">
  <meta name="theme-color" content="#4299e1">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    h1 {
      font-size: 1.3rem;
      color: #2d3748;
      margin-bottom: 20px;
      text-align: center;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 6px;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      background: #edf2f7;
      border-radius: 12px;
      padding: 12px 16px;
      gap: 8px;
    }

    .yen {
      font-size: 1.4rem;
      color: #4a5568;
      font-weight: 600;
    }

    #amount {
      flex: 1;
      font-size: 2rem;
      font-weight: 700;
      color: #1a202c;
      background: transparent;
      border: none;
      outline: none;
      width: 100%;
      text-align: right;
    }

    #amount::placeholder { color: #cbd5e0; font-size: 1.5rem; }

    .clear-btn {
      background: #cbd5e0;
      border: none;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #4a5568;
      flex-shrink: 0;
    }

    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .num-btn {
      background: #edf2f7;
      border: none;
      border-radius: 12px;
      padding: 18px;
      font-size: 1.3rem;
      font-weight: 600;
      color: #2d3748;
      cursor: pointer;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .num-btn:active { background: #bee3f8; }
    .num-btn.zero { grid-column: span 2; }
    .num-btn.del { background: #fed7d7; color: #c53030; }
    .num-btn.del:active { background: #fc8181; }

    .results {
      width: 100%;
      max-width: 420px;
    }

    .results h2 {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .result-item {
      background: #fff;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .result-item:active { transform: scale(0.98); }

    .result-item.best {
      border: 2px solid #48bb78;
      background: #f0fff4;
    }

    .result-item.exact {
      border: 2px solid #4299e1;
      background: #ebf8ff;
    }

    .pay-amount {
      font-size: 1.4rem;
      font-weight: 700;
      color: #1a202c;
    }

    .pay-label {
      font-size: 0.75rem;
      color: #718096;
      margin-top: 2px;
    }

    .change-box {
      text-align: right;
    }

    .change-amount {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .change-amount.zero { color: #4299e1; }
    .change-amount.round { color: #38a169; }

    .change-label {
      font-size: 0.75rem;
      color: #718096;
      margin-top: 2px;
    }

    .badge {
      font-size: 0.65rem;
      background: #48bb78;
      color: #fff;
      border-radius: 6px;
      padding: 2px 6px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .badge.exact-badge { background: #4299e1; }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 1rem;
    }

    .coin-hint {
      font-size: 0.72rem;
      color: #a0aec0;
      margin-top: 4px;
    }

    /* 使い方パネル */
    .help-toggle {
      background: none;
      border: none;
      color: #718096;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 0 auto 12px;
      padding: 4px 8px;
      border-radius: 8px;
    }
    .help-toggle:hover { background: #edf2f7; }

    .help-panel {
      width: 100%;
      max-width: 420px;
      background: #fffbeb;
      border: 1px solid #f6e05e;
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 16px;
      display: none;
    }
    .help-panel.open { display: block; }

    .help-panel h3 {
      font-size: 0.9rem;
      color: #744210;
      margin-bottom: 10px;
    }

    .help-step {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: flex-start;
    }

    .step-num {
      background: #f6ad55;
      color: #fff;
      border-radius: 50%;
      width: 22px;
      height: 22px;
      font-size: 0.75rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .step-text {
      font-size: 0.82rem;
      color: #744210;
      line-height: 1.5;
    }

    .help-legend {
      margin-top: 12px;
      border-top: 1px solid #f6e05e;
      padding-top: 10px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      color: #744210;
    }

    .legend-badge {
      font-size: 0.65rem;
      border-radius: 6px;
      padding: 2px 6px;
      font-weight: 600;
      white-space: nowrap;
    }
    .legend-badge.green { background: #48bb78; color: #fff; }
    .legend-badge.blue  { background: #4299e1; color: #fff; }
  </style>
</head>
<body>
  <h1>💴 まとまりお釣り計算</h1>

  <button class="help-toggle" onclick="toggleHelp()">
    <span id="help-icon">▶</span> 使い方
  </button>

  <div class="help-panel" id="help-panel">
    <h3>使い方</h3>
    <div class="help-step">
      <div class="step-num">1</div>
      <div class="step-text">レジで表示された<strong>合計金額</strong>をテンキーで入力します。</div>
    </div>
    <div class="help-step">
      <div class="step-num">2</div>
      <div class="step-text">下に<strong>支払い提案</strong>が自動で表示されます。<br>お釣りがきりのいい金額になる支払い方を一覧で確認できます。</div>
    </div>
    <div class="help-step">
      <div class="step-num">3</div>
      <div class="step-text">好きな支払い方を選んでレジに伝えましょう。<br>各項目に「何円札×何枚」の内訳も表示されます。</div>
    </div>
    <div class="help-legend">
      <div class="legend-item">
        <span class="legend-badge green">おすすめ</span>
        お釣りが最もまとまる支払い方
      </div>
      <div class="legend-item">
        <span class="legend-badge blue">ちょうど</span>
        ぴったり払う（お釣りなし）
      </div>
    </div>
  </div>

  <div class="card">
    <label>合計金額を入力</label>
    <div class="input-wrap">
      <span class="yen">¥</span>
      <input id="amount" type="text" inputmode="none" placeholder="0" readonly>
      <button class="clear-btn" onclick="clearAll()">✕</button>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="input('1')">1</button>
      <button class="num-btn" onclick="input('2')">2</button>
      <button class="num-btn" onclick="input('3')">3</button>
      <button class="num-btn" onclick="input('4')">4</button>
      <button class="num-btn" onclick="input('5')">5</button>
      <button class="num-btn" onclick="input('6')">6</button>
      <button class="num-btn" onclick="input('7')">7</button>
      <button class="num-btn" onclick="input('8')">8</button>
      <button class="num-btn" onclick="input('9')">9</button>
      <button class="num-btn zero" onclick="input('0')">0</button>
      <button class="num-btn del" onclick="del()">⌫</button>
    </div>
  </div>

  <div class="results" id="results">
    <p class="empty">金額を入力してください</p>
  </div>

  <script>
    let current = '';

    function toggleHelp() {
      const panel = document.getElementById('help-panel');
      const icon = document.getElementById('help-icon');
      const open = panel.classList.toggle('open');
      icon.textContent = open ? '▼' : '▶';
    }

    function input(d) {
      if (current.length >= 7) return;
      if (current === '' && d === '0') return;
      current += d;
      document.getElementById('amount').value = fmt(parseInt(current));
      calculate();
    }

    function del() {
      current = current.slice(0, -1);
      document.getElementById('amount').value = current ? fmt(parseInt(current)) : '';
      calculate();
    }

    function clearAll() {
      current = '';
      document.getElementById('amount').value = '';
      document.getElementById('results').innerHTML = '<p class="empty">金額を入力してください</p>';
    }

    function fmt(n) {
      return n.toLocaleString('ja-JP');
    }

    // まとまった金額の定義: お釣りがこれらになるとよい
    const ROUND_CHANGES = [0, 100, 500, 1000, 2000, 5000, 10000];

    // 紙幣・硬貨の構成を求める
    const COINS = [10000, 5000, 2000, 1000, 500, 100, 50, 10, 5, 1];

    function breakdown(amount) {
      let rest = amount;
      const parts = [];
      for (const c of COINS) {
        const n = Math.floor(rest / c);
        if (n > 0) {
          const label = c >= 1000 ? `${c/1000}千円札` : `${c}円`;
          parts.push(`${label}×${n}`);
          rest -= c * n;
        }
      }
      return parts.join(' + ');
    }

    function calculate() {
      if (!current) {
        document.getElementById('results').innerHTML = '<p class="empty">金額を入力してください</p>';
        return;
      }
      const total = parseInt(current);
      if (total <= 0) return;

      const suggestions = [];

      for (const change of ROUND_CHANGES) {
        const pay = total + change;
        // 支払い金額が実際に存在する紙幣・硬貨で払えるか（1円単位はすべて払える）
        suggestions.push({ pay, change });
      }

      // 支払い金額が小さい順、かつ合計以上に限定
      suggestions.sort((a, b) => a.pay - b.pay);

      let html = '<h2>支払い提案（お釣りがきりよくなります）</h2>';

      suggestions.forEach((s, i) => {
        const isExact = s.change === 0;
        const isBest = !isExact && i === 1; // お釣り最小のまとまり
        const cls = isExact ? 'exact' : (isBest ? 'best' : '');
        const badge = isExact
          ? '<span class="badge exact-badge">ちょうど</span>'
          : (isBest ? '<span class="badge">おすすめ</span>' : '');

        const changeColor = isExact ? 'zero' : 'round';
        const changeText = isExact ? 'お釣りなし' : `¥${fmt(s.change)}`;
        const coinHint = breakdown(s.pay);

        html += `
          <div class="result-item ${cls}">
            <div>
              <div class="pay-amount">¥${fmt(s.pay)} ${badge}</div>
              <div class="coin-hint">${coinHint}</div>
              <div class="pay-label">を支払う</div>
            </div>
            <div class="change-box">
              <div class="change-amount ${changeColor}">${changeText}</div>
              <div class="change-label">お釣り</div>
            </div>
          </div>`;
      });

      document.getElementById('results').innerHTML = html;
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
